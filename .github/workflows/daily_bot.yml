name: Daily YouTube Bot

on:
  schedule:
    # Günde 3 kez çalışır: 09:00, 14:00, 19:00 (TR saati ile UTC+3'e göre ayarlanmıştır)
    - cron: '0 6 * * *'
    - cron: '0 11 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch: # Manuel tetikleme için

jobs:
  produce_and_upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install FFmpeg & ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          # Fix ImageMagick policy for MoviePy
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_KIDS_REFRESH_TOKEN: ${{ secrets.YOUTUBE_KIDS_REFRESH_TOKEN }}
          YOUTUBE_FACTS_REFRESH_TOKEN: ${{ secrets.YOUTUBE_FACTS_REFRESH_TOKEN }}
        run: |
          # Parametreleri ayarlayarak günde 6 video çıkarabiliriz (--channel both --lang both --format shorts)
          python main.py --channel both --lang both --format shorts
          
      # Keep-alive commit (GitHub Actions 60 gün boşta kalırsa kapanır, bunu önlemek için)
      - name: Keep-alive commit
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "Keep workflow alive"
          git push
