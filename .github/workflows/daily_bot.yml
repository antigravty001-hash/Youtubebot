name: Daily YouTube Bot

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 10 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch: 

jobs:
  produce_and_upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install FFmpeg & ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_KIDS_REFRESH_TOKEN: ${{ secrets.YOUTUBE_KIDS_REFRESH_TOKEN }}
          YOUTUBE_FACTS_REFRESH_TOKEN: ${{ secrets.YOUTUBE_FACTS_REFRESH_TOKEN }}
        run: |
          python main.py --channel kids
          python main.py --channel facts
          
      - name: Save data and keep alive
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          git commit -m "Update logs and insights [skip ci]" || true
          git pull --rebase origin main || true
          git push
