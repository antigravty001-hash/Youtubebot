name: Generate 3D Video Bot

on:
  workflow_dispatch: 

jobs:
  generate_3d:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install FFmpeg & ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run 3D Video Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
        run: |
          python generate_3d_video.py
          
      - name: Upload 3D Videos as Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Generated-3D-Videos
          path: output/*.mp4
          retention-days: 3

      - name: Save data and keep alive
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          git commit -m "Update logs for 3D Video [skip ci]" || true
          git pull --rebase origin main || true
          git push
